    <script>
        // ---------- Setup / Keys ----------
        function init() {
            const g = localStorage.getItem('IND_GEMINI_KEY');
            const s = localStorage.getItem('IND_SERPAPI_KEY');
            const o = localStorage.getItem('IND_OPENROUTER_KEY');
            
            if(g) document.getElementById('key-gemini').value = g;
            if(o) document.getElementById('key-openrouter').value = o;
            if(s) document.getElementById('key-serpapi').value = s;

            if (!g || !s) {
                document.getElementById('setup-warning').classList.remove('hidden');
            } else {
                document.getElementById('setup-warning').classList.add('hidden');
            }
        }
        window.onload = init;

        function saveKeys() {
            localStorage.setItem('IND_GEMINI_KEY', document.getElementById('key-gemini').value.trim());
            localStorage.setItem('IND_OPENROUTER_KEY', document.getElementById('key-openrouter').value.trim());
            localStorage.setItem('IND_SERPAPI_KEY', document.getElementById('key-serpapi').value.trim());
            cachedFreeModels = null;
            alert('Keys stored securely on your browser instance.');
            init();
            switchTab('analysis');
        }

        function clearKeys() {
            if(confirm('Wipe local device key cache?')) {
                localStorage.removeItem('IND_GEMINI_KEY');
                localStorage.removeItem('IND_OPENROUTER_KEY');
                localStorage.removeItem('IND_SERPAPI_KEY');
                document.getElementById('key-gemini').value = "";
                document.getElementById('key-openrouter').value = "";
                document.getElementById('key-serpapi').value = "";
                cachedFreeModels = null;
                init();
            }
        }

        function switchTab(tab) {
            ['analysis', 'penny', 'keys'].forEach(t => {
                const btn = document.getElementById(`tab-${t}-btn`);
                const sec = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.className = `px-4 py-2 text-xs font-bold rounded-lg transition ${t === 'penny' ? 'bg-amber-500 text-slate-950' : 'bg-cyan-500 text-slate-950'}`;
                    sec.classList.remove('hidden');
                } else {
                    btn.className = "px-4 py-2 text-xs font-bold rounded-lg transition text-slate-400 hover:text-white";
                    sec.classList.add('hidden');
                }
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function fetchWithTimeout(url, options = {}, timeoutMs = 20000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeoutMs);
            return fetch(url, { ...options, signal: controller.signal })
                .finally(() => clearTimeout(id));
        }

        // ---------- Market data ----------
        async function fetchIndianMarketData(searchQuery) {
            const key = localStorage.getItem('IND_SERPAPI_KEY');
            if(!key) return "Error: Missing SerpAPI Key.";

            async function makeRequest(query) {
                try {
                    const targetUrl = `https://serpapi.com/search.json?q=${encodeURIComponent(query)}&hl=en&gl=in&api_key=${key}`;
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

                    const response = await fetchWithTimeout(proxyUrl, {}, 15000);
                    if (!response.ok) return null;

                    const data = await response.json();
                    if (data.error) return null;
                    if (data.organic_results && data.organic_results.length > 0) {
                        return data.organic_results.slice(0, 5).map(item => `Title: ${item.title}\nInfo: ${item.snippet}`).join("\n\n");
                    }
                } catch (e) { console.error("Market data fetch failed:", e); }
                return null;
            }

            let results = await makeRequest(searchQuery);
            if (!results) {
                results = await makeRequest("breakout stocks under 50 rs nse high volume moneycontrol");
            }
            if (!results) {
                results = await makeRequest("nse top gainers under 50 rs");
            }
            return results || "Error: Failed to fetch data from market engines.";
        }

        // ---------- Gemini ----------
        async function fetchGemini(prompt, key) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
            const res = await fetchWithTimeout(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            }, 25000);

            let data;
            try { data = await res.json(); } catch(e) { throw new Error("Gemini returned an invalid response."); }

            if (!res.ok) {
                throw new Error(data?.error?.message || `Gemini error (HTTP ${res.status})`);
            }
            if (data.candidates?.[0]?.content?.parts?.[0]?.text) return data.candidates[0].content.parts[0].text;
            throw new Error("Gemini returned an empty response.");
        }

        // ---------- OpenRouter ----------
        let cachedFreeModels = null;
        const FREE_MODELS_CACHE_MS = 10 * 60 * 1000;
        const MAX_FREE_MODELS_PER_RUN = 8;

        const FALLBACK_FREE_MODELS = [
            { id: "deepseek/deepseek-r1:free", name: "DeepSeek R1 (Free)" },
            { id: "deepseek/deepseek-chat:free", name: "DeepSeek Chat (Free)" },
            { id: "meta-llama/llama-3.3-70b-instruct:free", name: "Llama 3.3 70B (Free)" },
            { id: "google/gemma-3-27b-it:free", name: "Gemma 3 27B (Free)" },
            { id: "qwen/qwen-2.5-72b-instruct:free", name: "Qwen 2.5 72B (Free)" }
        ];

        async function getFreeOpenRouterModels(key) {
            const now = Date.now();
            if (cachedFreeModels && (now - cachedFreeModels.fetchedAt) < FREE_MODELS_CACHE_MS) {
                return cachedFreeModels.list;
            }

            try {
                const res = await fetchWithTimeout("https://openrouter.ai/api/v1/models", {
                    headers: { "Authorization": `Bearer ${key}` }
                }, 15000);
                if (!res.ok) throw new Error(`Model catalog HTTP ${res.status}`);
                const data = await res.json();
                const models = (data.data || [])
                    .filter(m => {
                        const promptPrice = parseFloat(m.pricing?.prompt ?? "1");
                        const completionPrice = parseFloat(m.pricing?.completion ?? "1");
                        return m.id?.endsWith(":free") || (promptPrice === 0 && completionPrice === 0);
                    })
                    .map(m => ({ id: m.id, name: m.name || m.id }));

                if (models.length > 0) {
                    cachedFreeModels = { list: models, fetchedAt: now };
                    return models;
                }
                return FALLBACK_FREE_MODELS;
            } catch (e) {
                return FALLBACK_FREE_MODELS;
            }
        }

        async function fetchOpenRouter(model, prompt, key) {
            const res = await fetchWithTimeout("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${key}`, 
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.href,
                    "X-Title": "AI Stock Companion"
                },
                body: JSON.stringify({ model: model, messages: [{ role: "user", content: prompt }] })
            }, 25000);

            let data;
            try { data = await res.json(); } catch(e) { throw new Error(`HTTP ${res.status}`); }

            if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
            if (data.choices?.[0]?.message?.content) return data.choices[0].message.content;
            throw new Error("Empty response.");
        }

        function updateModelGrid(element, modelName, content) {
            let cleanHtml = parseSimpleMarkdown(content);
            element.innerHTML += `
                <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 shadow-md">
                    <div class="text-xs text-cyan-400 font-bold mb-2 tracking-wide border-b border-slate-800 pb-1">${modelName}</div>
                    <div class="text-xs text-slate-300 leading-relaxed">${cleanHtml}</div>
                </div>
            `;
        }

        async function runOpenRouterWaterfall(oKey, prompt, grid, loaderTextEl, onEachResult) {
            const allModels = await getFreeOpenRouterModels(oKey);
            const models = allModels.slice(0, MAX_FREE_MODELS_PER_RUN);

            for (let i = 0; i < models.length; i++) {
                const model = models[i];
                if (loaderTextEl) {
                    loaderTextEl.textContent = `Querying free model ${i + 1}/${models.length}: ${model.name}...`;
                }
                try {
                    if (i > 0) await sleep(3200);
                    const res = await fetchOpenRouter(model.id, prompt, oKey);
                    updateModelGrid(grid, model.name, res);
                    onEachResult(res);
                } catch (e) {
                    updateModelGrid(grid, model.name, `❌ Skipped: ${e.message || "Busy."}`);
                }
            }
        }

        // ---------- Refined Waterfall Engines ----------
        async function runMultiModelAnalysis() {
            const ticker = document.getElementById('ticker-input').value.trim().toUpperCase();
            if(!ticker) return alert("Enter an Indian Ticker (e.g. IRFC)");

            const loader = document.getElementById('analysis-loader');
            const loaderText = document.getElementById('analysis-loader-text');
            const outputBox = document.getElementById('analysis-output-box');
            const consensusTarget = document.getElementById('consensus-verdict-target');
            const grid = document.getElementById('model-responses-grid');

            loader.classList.remove('hidden');
            outputBox.classList.add('hidden');
            grid.innerHTML = "";
            loaderText.textContent = "Gathering live market data...";

            const gKey = localStorage.getItem('IND_GEMINI_KEY');
            const oKey = localStorage.getItem('IND_OPENROUTER_KEY');

            if (!gKey && !oKey) {
                loader.classList.add('hidden');
                alert("Add a key in the Keys tab first.");
                return;
            }

            const liveContext = await fetchIndianMarketData(`${ticker} stock share price target analysis news nse`);
            
            const prompt = `
            You are a strict technical analyst evaluating the Indian stock ticker ${ticker}. Review this live market context:
            "${liveContext}"

            Analyze data indicators like volumes and recent technical breakouts. Provide a clear output containing these exact tags:
            VERDICT: [BUY, SELL, or STAY]
            REASON: [One short definitive layout sentence]
            `;

            let buys = 0, sells = 0, stays = 0;
            const tally = (res) => {
                const cleanText = res.toUpperCase().replace(/\*/g, '');
                if (/VERDICT\s*:\s*BUY/.test(cleanText)) buys++;
                else if (/VERDICT\s*:\s*SELL/.test(cleanText)) sells++;
                else if (/VERDICT\s*:\s*STAY/.test(cleanText) || /VERDICT\s*:\s*HOLD/.test(cleanText)) stays++;
            };

            if(gKey) {
                try {
                    const res = await fetchGemini(prompt, gKey);
                    updateModelGrid(grid, "Gemini 2.5 Flash", res);
                    tally(res);
                } catch(e) {
                    updateModelGrid(grid, "Gemini 2.5 Flash", `❌ ${e.message}`);
                }
            }

            if(oKey) {
                await runOpenRouterWaterfall(oKey, prompt, grid, loaderText, tally);
            }

            let finalDecision = "STAY / HOLD";
            let colorClass = "bg-amber-500/10 text-amber-400 border-amber-500/30";
            if (buys > sells && buys >= stays) { finalDecision = "BUY / ACCUMULATE"; colorClass = "bg-emerald-500/10 text-emerald-400 border-emerald-500/30"; }
            else if (sells > buys && sells >= stays) { finalDecision = "SELL / LIQUIDATE"; colorClass = "bg-rose-500/10 text-rose-400 border-rose-500/30"; }

            consensusTarget.innerHTML = `
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mt-2">
                    <div>
                        <div class="text-3xl font-black tracking-tight text-white">${ticker}</div>
                        <div class="text-xs text-slate-400 mt-1">Waterfall Matrix: ${buys} Buy, ${sells} Sell, ${stays} Hold</div>
                    </div>
                    <div class="px-6 py-3 rounded-xl border text-center font-black tracking-wider text-sm ${colorClass}">
                        ${finalDecision}
                    </div>
                </div>
            `;

            loader.classList.add('hidden');
            outputBox.classList.remove('hidden');
        }

        async function runMultiModelPennyScanner() {
            const loader = document.getElementById('penny-loader');
            const loaderText = document.getElementById('penny-loader-text');
            const outputBox = document.getElementById('penny-output-box');
            const consensusTarget = document.getElementById('penny-consensus-target');
            const grid = document.getElementById('penny-responses-grid');

            loader.classList.remove('hidden');
            outputBox.classList.add('hidden');
            grid.innerHTML = "";
            loaderText.textContent = "Scanning breakout momentum matrices...";

            const gKey = localStorage.getItem('IND_GEMINI_KEY');
            const oKey = localStorage.getItem('IND_OPENROUTER_KEY');

            if (!gKey && !oKey) {
                loader.classList.add('hidden');
                alert("Add keys in the Settings panel.");
                return;
            }

            const liveContext = await fetchIndianMarketData("breakout stocks under 50 rs nse volume gainers moneycontrol order");

            // Hardened prompt forcing the AI to act as an algorithmic filter to score by top yields
            const prompt = `
            You are an aggressive algorithmic stock scanner looking at low-priced Indian breakout setups under ₹50.
            Review this high-volume live market feed data carefully:
            "${liveContext}"

            Filter out the noise and select exactly ONE precise Indian ticker symbol that presents the absolute HIGHEST mathematical percentage profit potential within a tight 1-2 week setup window based on volume delta spikes.

            Your output must strictly contain this format:
            TICKER: [EXACT SYMBOL ONLY]
            PROFIT TARGET: [Expected % Profit, e.g., 25%]
            CATALYST: [One short sentence detailing technical breakout volume]
            `;

            // High precision cross-model target matching matrix
            let candidateTracker = {};
            let highestTargetStock = "Scanning Complete";
            let maxReportedProfit = -1;

            const extractTopTicker = (res) => {
                const cleanRes = res.replace(/\*/g, '');
                
                // Flexible regex to capture ticker name and target number values
                const tickerMatch = cleanRes.match(/TICKER\s*:\s*([A-Za-z0-9_-]+)/i);
                const profitMatch = cleanRes.match(/PROFIT\s*TARGET\s*:\s*.*?(\d+)\s*%/i);
                
                if (tickerMatch) {
                    const symbol = tickerMatch[1].trim().toUpperCase();
                    let profitPct = profitMatch ? parseInt(profitMatch[1], 10) : 5;
                    
                    // Track choices across models to aggregate the highest profit projection
                    if (!candidateTracker[symbol] || profitPct > candidateTracker[symbol]) {
                        candidateTracker[symbol] = profitPct;
                    }
                    
                    if (candidateTracker[symbol] > maxReportedProfit) {
                        maxReportedProfit = candidateTracker[symbol];
                        highestTargetStock = symbol;
                    }
                }
            };

            if(gKey) {
                try {
                    const res = await fetchGemini(prompt, gKey);
                    updateModelGrid(grid, "Gemini 2.5 Flash", res);
                    extractTopTicker(res);
                } catch(e) {
                    updateModelGrid(grid, "Gemini 2.5 Flash", `❌ Pipeline skip.`);
                }
            }

            if(oKey) {
                await runOpenRouterWaterfall(oKey, prompt, grid, loaderText, extractTopTicker);
            }

            // Fallback default safe check if parsing fails completely
            if (highestTargetStock === "Scanning Complete" && Object.keys(candidateTracker).length > 0) {
                highestTargetStock = Object.keys(candidateTracker)[0];
                maxReportedProfit = candidateTracker[highestTargetStock];
            }

            const targetDisplayProfit = maxReportedProfit > 0 ? `🔥 Est Profit: +${maxReportedProfit}%` : `⏱️ Horizon: 1-2 Weeks`;

            consensusTarget.innerHTML = `
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <div class="text-3xl font-black tracking-tight text-amber-400">${highestTargetStock}</div>
                        <p class="text-xs text-slate-400 mt-1">Aggregated peak value asset extracted via model consensus matrix.</p>
                    </div>
                    <div class="bg-amber-500/10 text-amber-400 border border-amber-500/30 px-4 py-2 rounded-xl text-xs font-black tracking-wider uppercase">
                        ${targetDisplayProfit}
                    </div>
                </div>
            `;

            loader.classList.add('hidden');
            outputBox.classList.remove('hidden');
        }

        function parseSimpleMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/^# (.*)$/gim, '<h1 class="text-base font-black text-white border-b border-slate-800 pb-1 mb-2">$1</h1>')
                .replace(/VERDICT:\s*BUY/gim, '<span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded font-bold text-xs inline-block my-1">🟢 BUY</span>')
                .replace(/VERDICT:\s*SELL/gim, '<span class="bg-rose-500/20 text-rose-400 border border-rose-500/30 px-2 py-0.5 rounded font-bold text-xs inline-block my-1">🔴 SELL</span>')
                .replace(/VERDICT:\s*STAY/gim, '<span class="bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2 py-0.5 rounded font-bold text-xs inline-block my-1">🟡 HOLD / STAY</span>')
                .replace(/TICKER:\s*(.*)$/gim, '<span class="block text-amber-400 font-bold my-1">Ticker Symbol: $1</span>')
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-cyan-400 font-bold">$1</strong>')
                .replace(/^\* (.*)$/gim, '<li class="ml-2 list-disc text-slate-300">$1</li>')
                .replace(/\n/g, '<br>');
        }
    </script>
